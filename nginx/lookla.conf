# Lookla Beauty Marketplace
# Public IP: 79.108.225.75
# SSL handled by Cloudflare (Full mode) — use Cloudflare Origin Certificate

server {
    listen 80;
    listen [::]:80;
    server_name lookla.gr www.lookla.gr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lookla.gr www.lookla.gr;

    # Cloudflare Origin Certificate (generate at CF dashboard → SSL → Origin Server)
    # Place files at:
    ssl_certificate     /etc/ssl/cloudflare/lookla.gr.pem;
    ssl_certificate_key /etc/ssl/cloudflare/lookla.gr.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.lookla.gr; frame-src https://challenges.cloudflare.com;" always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── API (FastAPI) ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 20M;
    }

    # ── Frontend (Next.js) ────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Next.js HMR websocket (dev only, harmless in prod)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Static / Health ───────────────────────────────────────
    location = /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
